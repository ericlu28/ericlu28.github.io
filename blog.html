---
layout: default
title: Blog
---

<main class="container-narrow">

  <div class="blog-header">
    <h1>Blog</h1>
    <p>Occasional writing on software, ideas, and things I find interesting.</p>
  </div>

  <section>
    <ul class="post-list">
      {% for post in site.posts %}
      <li class="post-item">
        <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
        <span class="post-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></span>
      </li>
      {% endfor %}
    </ul>

    {% if site.posts.size == 0 %}
    <div class="empty-state">
      <i class="bi bi-pencil-square" style="font-size:2rem; color:var(--border);"></i>
      <p>More coming soon.</p>
    </div>
    {% endif %}
  </section>

</main>
